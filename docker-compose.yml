version: "3.8"

services:
  doppelganger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doppelganger-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    environment:
      - DATA_DIR=/app/data/profiles
      - LOG_LEVEL=INFO

volumes:
  bot-data:
    driver: local
